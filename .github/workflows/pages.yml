# Manual fallback deployment for GitHub Pages.
# Only runs when triggered by hand (workflow_dispatch), and only works
# if repo Settings > Pages > Source is set to "GitHub Actions".
name: Deploy Pages (manual fallback)
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
